<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Icon Generator</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 650px;
            margin: 0 auto;
            padding: 40px 20px;
            background: #f5f5f5;
        }
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            position: relative;
        }
        .export-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: #007aff;
            color: white;
            border: none;
            padding: 8px 12px;
            font-size: 14px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .export-btn:hover { background: #0056b3; }
        .export-btn svg { width: 16px; height: 16px; }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            padding-bottom: 0;
        }
        .tab-btn {
            padding: 10px 20px;
            border: none;
            background: none;
            font-size: 14px;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }
        .tab-btn:hover { color: #333; }
        .tab-btn.active {
            color: #007aff;
            border-bottom-color: #007aff;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #444; }
        .radio-group { display: flex; gap: 12px; }
        .radio-option { flex: 1; position: relative; }
        .radio-option input { position: absolute; opacity: 0; }
        .radio-option label {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .radio-option input:checked + label { border-color: #007aff; background: #f0f7ff; }
        .radio-option label:hover { border-color: #999; }
        .radio-option .icon-preview { width: 48px; height: 36px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; }
        .radio-option .icon-preview svg { width: 100%; height: 100%; }
        
        .theme-group { display: flex; gap: 8px; }
        .theme-option { flex: 1; position: relative; }
        .theme-option input { position: absolute; opacity: 0; }
        .theme-option label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .theme-option input:checked + label { border-color: #007aff; background: #f0f7ff; }
        .theme-option label:hover { border-color: #999; }
        .theme-swatch { width: 20px; height: 20px; border-radius: 4px; border: 1px solid #ccc; }
        .theme-swatch.light { background: #fefefe; }
        .theme-swatch.dark { background: #3b4453; }
        
        input[type="text"] {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-align: center;
        }
        input[type="text"]:focus { outline: none; border-color: #007aff; }
        
        .preview-section { text-align: center; margin-top: 24px; padding-top: 24px; border-top: 1px solid #eee; }
        .preview-container { display: inline-block; padding: 20px; border-radius: 8px; margin-bottom: 16px; transition: background 0.2s; }
        .preview-container.light { background: #fefefe; border: 1px solid #e0e0e0; }
        .preview-container.dark { background: #3b4453; }
        .preview-label { font-size: 12px; margin-bottom: 8px; }
        .preview-label.light { color: #888; }
        .preview-label.dark { color: #aaa; }
        .preview-actual, .preview-scaled { image-rendering: pixelated; image-rendering: crisp-edges; }
        .preview-row { display: flex; justify-content: center; gap: 30px; align-items: flex-end; }
        .preview-item { text-align: center; }
        .specs { font-size: 12px; color: #666; margin-top: 16px; }
        .reference-icon { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; }
        .reference-icon svg { width: 100%; height: 100%; }
        .reference-icon img { width: 100%; height: 100%; image-rendering: pixelated; image-rendering: crisp-edges; }
        #reference-container { display: none; }
        #reference-container.show { display: block; }
        
        /* Pixel Editor */
        .editor-tools {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .editor-tools.hidden { display: none; }
        .tool-btn {
            padding: 6px 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .tool-btn:hover { border-color: #999; }
        .tool-btn.active { border-color: #007aff; background: #f0f7ff; }
        .tool-btn.save { background: #007aff; color: white; border-color: #007aff; }
        .tool-btn.save:hover { background: #0056b3; }
        #preview-scaled { cursor: crosshair; outline: 1px solid rgba(128, 128, 128, 0.3); }
        .editor-hint {
            font-size: 11px;
            color: #888;
            margin-top: 8px;
        }
        .editor-hint.hidden { display: none; }
        .hidden-canvas { display: none; }
        
        /* Symbol Grid */
        .symbol-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }
        .symbol-btn {
            aspect-ratio: 1;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            padding: 4px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .symbol-btn:hover { border-color: #999; }
        .symbol-btn.selected { border-color: #007aff; background: #f0f7ff; }
        .symbol-btn canvas { image-rendering: pixelated; image-rendering: crisp-edges; }
    </style>
</head>
<body>
    <h1>Pixel Icon Generator</h1>
    
    <div class="card">
        <button class="export-btn" id="export-btn">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
            </svg>
            Export
        </button>
        
        <div class="tabs">
            <button class="tab-btn active" data-tab="letters">Letters</button>
            <button class="tab-btn" data-tab="symbols">Special Symbols</button>
        </div>
        
        <!-- Letters Tab -->
        <div class="tab-content active" id="tab-letters">
            <div class="form-group">
                <label>Number of Letters</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" name="letterCount" id="opt1" value="1">
                        <label for="opt1">
                            <div class="icon-preview">
                                <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="7" fill="none" stroke="black" stroke-width="1"/><text x="8" y="11" text-anchor="middle" font-size="8" font-family="monospace">A</text></svg>
                            </div>
                            1 Letter
                        </label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" name="letterCount" id="opt2" value="2" checked>
                        <label for="opt2">
                            <div class="icon-preview">
                                <svg viewBox="0 0 16 12"><rect x="0.5" y="0.5" width="15" height="11" rx="5" fill="none" stroke="black" stroke-width="1"/><text x="8" y="9" text-anchor="middle" font-size="6" font-family="monospace">AB</text></svg>
                            </div>
                            2 Letters
                        </label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" name="letterCount" id="opt3" value="3">
                        <label for="opt3">
                            <div class="icon-preview">
                                <svg viewBox="0 0 16 12"><rect x="0.5" y="0.5" width="15" height="11" rx="5" fill="none" stroke="black" stroke-width="1"/><text x="8" y="9" text-anchor="middle" font-size="5" font-family="monospace">ABC</text></svg>
                            </div>
                            3 Letters
                        </label>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="letters">Enter Letters (A-Z)</label>
                <input type="text" id="letters" maxlength="3" placeholder="AB" value="AB">
            </div>
        </div>
        
        <!-- Symbols Tab -->
        <div class="tab-content" id="tab-symbols">
            <div class="form-group">
                <label>Select Symbol (29 icons)</label>
                <div class="symbol-grid" id="symbol-grid"></div>
            </div>
        </div>
        
        <!-- Shared Theme Selector -->
        <div class="form-group">
            <label>Theme (Preview)</label>
            <div class="theme-group">
                <div class="theme-option">
                    <input type="radio" name="theme" id="theme-light" value="light" checked>
                    <label for="theme-light">
                        <span class="theme-swatch light"></span>
                        Light
                    </label>
                </div>
                <div class="theme-option">
                    <input type="radio" name="theme" id="theme-dark" value="dark">
                    <label for="theme-dark">
                        <span class="theme-swatch dark"></span>
                        Dark
                    </label>
                </div>
            </div>
        </div>
        
        <div class="preview-section">
            <label>Preview</label>
            <div class="editor-tools hidden" id="editor-tools">
                <button class="tool-btn active" id="tool-fill" data-tool="fill">Fill</button>
                <button class="tool-btn" id="tool-erase" data-tool="erase">Erase</button>
                <button class="tool-btn save" id="tool-save">Save Changes</button>
            </div>
            <div class="preview-container light" id="preview-container">
                <div class="preview-row">
                    <div class="preview-item">
                        <div class="preview-label light" id="label-actual">Actual Size</div>
                        <canvas id="preview-actual" class="preview-actual"></canvas>
                    </div>
                    <div class="preview-item">
                        <div class="preview-label light" id="label-scaled">8× Scaled</div>
                        <canvas id="preview-scaled" class="preview-scaled"></canvas>
                    </div>
                    <div class="preview-item" id="reference-container">
                        <div class="preview-label light" id="label-reference">Reference</div>
                        <div class="reference-icon" id="reference-icon"></div>
                    </div>
                </div>
            </div>
            <div class="editor-hint hidden" id="editor-hint">Click on the scaled preview to fill or erase pixels</div>
            <div class="specs" id="specs"></div>
        </div>
    </div>
    
    <canvas id="export-light" class="hidden-canvas"></canvas>
    <canvas id="export-dark" class="hidden-canvas"></canvas>

        // ==================== DRAWING FUNCTIONS ====================
        function drawPixels(ctx, pixels, color) {
            ctx.fillStyle = color;
            pixels.forEach(([x, y]) => ctx.fillRect(x, y, 1, 1));
        }

        function drawLetter(ctx, letter, offsetX, offsetY, font, color) {
            if (!font[letter]) return;
            ctx.fillStyle = color;
            font[letter].forEach(([x, y]) => ctx.fillRect(offsetX + x, offsetY + y, 1, 1));
        }

        // ==================== LETTER ICON GENERATION ====================
        function getLetterParams() {
            const letterCount = parseInt(document.querySelector('input[name="letterCount"]:checked').value);
            const input = document.getElementById('letters').value.toUpperCase().replace(/[^A-Z]/g, '');
            let letters, font, letterWidth, letterHeight, spacing;
            
            if (letterCount === 1) {
                letters = input.slice(0, 1) || 'A';
                font = FONT_LARGE;
                letterWidth = 6;
                letterHeight = 10;
                spacing = 0;
            } else if (letterCount === 2) {
                letters = input.slice(0, 2) || 'AB';
                font = FONT_MEDIUM;
                letterWidth = 4;
                letterHeight = 7;
                spacing = 1;
            } else {
                letters = input.slice(0, 3) || 'ABC';
                font = FONT_SMALL;
                letterWidth = 3;
                letterHeight = 5;
                spacing = 1;
            }
            while (letters.length < letterCount) letters += 'A';
            return { letterCount, letters, font, letterWidth, letterHeight, spacing };
        }

        function drawLetterIcon(canvas, color) {
            const { letterCount, letters, font, letterWidth, letterHeight, spacing } = getLetterParams();
            const ctx = canvas.getContext('2d');
            canvas.width = 16;
            canvas.height = 16;
            ctx.clearRect(0, 0, 16, 16);
            
            drawPixels(ctx, letterCount === 1 ? CIRCLE_PIXELS : PILL_PIXELS, color);
            
            const totalLetterWidth = letterCount * letterWidth + (letterCount - 1) * spacing;
            const startX = Math.floor((16 - totalLetterWidth) / 2);
            const startY = letterCount === 1 ? 3 : letterCount === 2 ? 4 : 5;
            
            for (let i = 0; i < letterCount; i++) {
                drawLetter(ctx, letters[i], startX + i * (letterWidth + spacing), startY, font, color);
            }
            return letters;
        }

        // ==================== SYMBOL ICON GENERATION ====================
        function drawSymbolIcon(canvas, symbolKey, color) {
            const ctx = canvas.getContext('2d');
            canvas.width = 16;
            canvas.height = 16;
            ctx.clearRect(0, 0, 16, 16);
            drawPixels(ctx, SYMBOLS[symbolKey].pixels, color);
        }

        // ==================== UI FUNCTIONS ====================
        function updateTheme() {
            const theme = document.querySelector('input[name="theme"]:checked').value;
            document.getElementById('preview-container').className = 'preview-container ' + theme;
            document.getElementById('label-actual').className = 'preview-label ' + theme;
            document.getElementById('label-scaled').className = 'preview-label ' + theme;
        }

        function generatePreview() {
            const theme = document.querySelector('input[name="theme"]:checked').value;
            const color = theme === 'light' ? 'black' : 'white';
            const canvasActual = document.getElementById('preview-actual');
            const canvasScaled = document.getElementById('preview-scaled');
            const referenceContainer = document.getElementById('reference-container');
            const referenceIcon = document.getElementById('reference-icon');
            const labelReference = document.getElementById('label-reference');
            let specText;

            if (currentTab === 'letters') {
                const letters = drawLetterIcon(canvasActual, color);
                const { letterCount } = getLetterParams();
                specText = `16×16px • ${letterCount} letter${letterCount > 1 ? 's' : ''} • "${letters}"`;
                document.getElementById('letters').maxLength = letterCount;
                referenceContainer.classList.remove('show');
                showEditorTools(false);
                editedPixels = null;
            } else {
                const symbolKey = SYMBOL_KEYS[selectedSymbol];
                
                // If we have edited pixels for this symbol, use them
                if (editedPixels) {
                    redrawFromEditedPixels();
                } else {
                    drawSymbolIcon(canvasActual, symbolKey, color);
                }
                
                specText = `16×16px • Symbol • "${SYMBOLS[symbolKey].name}"`;
                
                // Show reference SVG icon
                referenceContainer.classList.add('show');
                referenceIcon.innerHTML = `<svg viewBox="0 0 16 16" style="color: ${color}">${SYMBOLS[symbolKey].svg}</svg>`;
                labelReference.className = 'preview-label ' + theme;
                showEditorTools(true);
            }

            if (!editedPixels) {
                canvasScaled.width = 128;
                canvasScaled.height = 128;
                const ctxScaled = canvasScaled.getContext('2d');
                ctxScaled.imageSmoothingEnabled = false;
                ctxScaled.drawImage(canvasActual, 0, 0, 128, 128);
            }
            
            document.getElementById('specs').textContent = specText;
            updateTheme();
        }

        function exportIcons() {
            const canvasLight = document.getElementById('export-light');
            const canvasDark = document.getElementById('export-dark');
            let filename;

            if (currentTab === 'letters') {
                filename = drawLetterIcon(canvasLight, 'black');
                drawLetterIcon(canvasDark, 'white');
            } else {
                const symbolKey = SYMBOL_KEYS[selectedSymbol];
                filename = symbolKey;
                drawSymbolIcon(canvasLight, symbolKey, 'black');
                drawSymbolIcon(canvasDark, symbolKey, 'white');
            }

            const linkLight = document.createElement('a');
            linkLight.download = `icon_${filename}_light.png`;
            linkLight.href = canvasLight.toDataURL('image/png');
            linkLight.click();

            setTimeout(() => {
                const linkDark = document.createElement('a');
                linkDark.download = `icon_${filename}_dark.png`;
                linkDark.href = canvasDark.toDataURL('image/png');
                linkDark.click();
            }, 100);
        }

        function initSymbolGrid() {
            const grid = document.getElementById('symbol-grid');
            grid.innerHTML = '';
            SYMBOL_KEYS.forEach((key, index) => {
                const btn = document.createElement('button');
                btn.className = 'symbol-btn' + (index === 0 ? ' selected' : '');
                btn.title = SYMBOLS[key].name;
                const canvas = document.createElement('canvas');
                canvas.width = 16;
                canvas.height = 16;
                drawSymbolIcon(canvas, key, 'black');
                canvas.style.width = '32px';
                canvas.style.height = '32px';
                btn.appendChild(canvas);
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.symbol-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedSymbol = index;
                    editedPixels = null;  // Reset edited pixels when switching symbols
                    generatePreview();
                });
                grid.appendChild(btn);
            });
        }

        function switchTab(tabId) {
            currentTab = tabId;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tabId));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.toggle('active', content.id === 'tab-' + tabId));
            generatePreview();
        }

        // ==================== PIXEL EDITOR ====================
        function initPixelEditor() {
            const canvasScaled = document.getElementById('preview-scaled');
            
            canvasScaled.addEventListener('mousedown', (e) => {
                if (currentTab !== 'symbols') return;
                isDrawing = true;
                editPixel(e);
            });
            
            canvasScaled.addEventListener('mousemove', (e) => {
                if (!isDrawing || currentTab !== 'symbols') return;
                editPixel(e);
            });
            
            canvasScaled.addEventListener('mouseup', () => { isDrawing = false; });
            canvasScaled.addEventListener('mouseleave', () => { isDrawing = false; });
            
            // Tool buttons
            document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentTool = btn.dataset.tool;
                    document.querySelectorAll('.tool-btn[data-tool]').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                });
            });
            
            // Save button
            document.getElementById('tool-save').addEventListener('click', savePixelChanges);
        }
        
        function editPixel(e) {
            const canvas = document.getElementById('preview-scaled');
            const rect = canvas.getBoundingClientRect();
            const scale = 8;
            
            const x = Math.floor((e.clientX - rect.left) / scale);
            const y = Math.floor((e.clientY - rect.top) / scale);
            
            if (x < 0 || x >= 16 || y < 0 || y >= 16) return;
            
            // Initialize edited pixels if needed
            if (!editedPixels) {
                const symbolKey = SYMBOL_KEYS[selectedSymbol];
                editedPixels = new Set(SYMBOLS[symbolKey].pixels.map(p => `${p[0]},${p[1]}`));
            }
            
            const key = `${x},${y}`;
            if (currentTool === 'fill') {
                editedPixels.add(key);
            } else {
                editedPixels.delete(key);
            }
            
            // Redraw
            redrawFromEditedPixels();
        }
        
        function redrawFromEditedPixels() {
            const theme = document.querySelector('input[name="theme"]:checked').value;
            const color = theme === 'light' ? 'black' : 'white';
            const canvasActual = document.getElementById('preview-actual');
            const canvasScaled = document.getElementById('preview-scaled');
            const ctx = canvasActual.getContext('2d');
            
            canvasActual.width = 16;
            canvasActual.height = 16;
            ctx.clearRect(0, 0, 16, 16);
            
            // Draw pixels from edited set
            ctx.fillStyle = color;
            editedPixels.forEach(key => {
                const [x, y] = key.split(',').map(Number);
                ctx.fillRect(x, y, 1, 1);
            });
            
            // Scale up
            canvasScaled.width = 128;
            canvasScaled.height = 128;
            const ctxScaled = canvasScaled.getContext('2d');
            ctxScaled.imageSmoothingEnabled = false;
            ctxScaled.drawImage(canvasActual, 0, 0, 128, 128);
        }
        
        function savePixelChanges() {
            if (!editedPixels) return;
            
            // Convert Set back to array of [x,y] pairs
            const newPixels = Array.from(editedPixels).map(key => {
                const [x, y] = key.split(',').map(Number);
                return [x, y];
            });
            
            // Update the symbol
            const symbolKey = SYMBOL_KEYS[selectedSymbol];
            SYMBOLS[symbolKey].pixels = newPixels;
            
            // Update the symbol grid button
            const gridBtns = document.querySelectorAll('.symbol-btn');
            const canvas = gridBtns[selectedSymbol].querySelector('canvas');
            drawSymbolIcon(canvas, symbolKey, 'black');
            
            // Show confirmation
            const saveBtn = document.getElementById('tool-save');
            const originalText = saveBtn.textContent;
            saveBtn.textContent = 'Saved!';
            setTimeout(() => { saveBtn.textContent = originalText; }, 1000);
            
            // Log the new pixel array for copying
            console.log(`'${symbolKey}': { name: '${SYMBOLS[symbolKey].name}', pixels: ${JSON.stringify(newPixels)}, svg: '${SYMBOLS[symbolKey].svg}' }`);
        }
        
        function showEditorTools(show) {
            document.getElementById('editor-tools').classList.toggle('hidden', !show);
            document.getElementById('editor-hint').classList.toggle('hidden', !show);
        }

        // ==================== EVENT LISTENERS ====================
        document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));
        document.querySelectorAll('input[name="letterCount"]').forEach(radio => radio.addEventListener('change', generatePreview));
        document.querySelectorAll('input[name="theme"]').forEach(radio => radio.addEventListener('change', generatePreview));
        document.getElementById('letters').addEventListener('input', generatePreview);
        document.getElementById('export-btn').addEventListener('click', exportIcons);

        // ==================== INIT ====================
        initSymbolGrid();
        initPixelEditor();
        generatePreview();
    </script>
</body>
</html>
